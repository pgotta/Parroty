name: Native Parroty window close

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  native-window-close:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell launcher
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Verify window disappearance is detected while host remains alive
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          $functions = $ast.FindAll({
            param($node)
            $node -is [System.Management.Automation.Language.FunctionDefinitionAst]
          }, $true)
          foreach ($function in $functions) { Invoke-Expression $function.Extent.Text }

          $script:windowChecks = 0
          $simulatedWindow = {
            param([IntPtr]$Handle)
            if ($Handle -ne [IntPtr]12345) { throw "Unexpected test handle" }
            $script:windowChecks++
            return ($script:windowChecks -lt 5)
          }

          $host = [System.Diagnostics.Process]::GetCurrentProcess()
          $watch = [System.Diagnostics.Stopwatch]::StartNew()
          Wait-ParrotyWindowClose `
            -WindowHandle ([IntPtr]12345) `
            -WindowProcess $host `
            -WindowExists $simulatedWindow `
            -PollMilliseconds 25
          $watch.Stop()

          if ($script:windowChecks -ne 5) {
            throw "Watcher did not poll until the window disappeared: $script:windowChecks checks"
          }
          if ($watch.Elapsed.TotalMilliseconds -lt 70 -or $watch.Elapsed.TotalSeconds -gt 2) {
            throw "Watcher timing was unexpected: $($watch.Elapsed.TotalMilliseconds) ms"
          }
          if (-not (Get-Process -Id $host.Id -ErrorAction SilentlyContinue)) {
            throw "Host process exited even though only the window disappeared"
          }

      - name: Verify recorded backend PID is stopped
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          $functions = $ast.FindAll({
            param($node)
            $node -is [System.Management.Automation.Language.FunctionDefinitionAst]
          }, $true)
          foreach ($function in $functions) { Invoke-Expression $function.Extent.Text }

          $listener = Start-Process python -ArgumentList @(
            "-m", "http.server", "5000", "--bind", "127.0.0.1"
          ) -PassThru -WindowStyle Hidden
          try {
            $captured = @()
            for ($i = 0; $i -lt 40; $i++) {
              Start-Sleep -Milliseconds 250
              $captured = @(Get-ParrotyBackendPids -ListenerPort 5000)
              if ($captured -contains $listener.Id) { break }
            }
            if ($captured -notcontains $listener.Id) { throw "Listener PID was not captured" }
            Stop-ParrotyBackend -ProcessIds $captured
            Start-Sleep -Milliseconds 500
            if (Get-Process -Id $listener.Id -ErrorAction SilentlyContinue) {
              throw "Recorded backend PID remained alive"
            }
          }
          finally {
            Stop-Process -Id $listener.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Enforce BAT exclusion
        shell: pwsh
        run: |
          $trackedBat = @(git ls-files "*.bat")
          if ($trackedBat.Count -gt 0) {
            throw "Tracked BAT files found: $($trackedBat -join ', ')"
          }
