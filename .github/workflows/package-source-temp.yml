name: Package Parroty Source Temp

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out final main branch
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Build clean full-project ZIP
        run: |
          mkdir -p staging/Parroty
          rsync -a --exclude='.git/' --exclude='.github/workflows/package-source-temp.yml' --exclude='staging/' ./ staging/Parroty/
          cd staging
          zip -qr ../Parroty-full.zip Parroty
      - name: Upload source ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Parroty-full
          path: Parroty-full.zip
          if-no-files-found: error
          retention-days: 1
