name: Apply window-close documentation

on:
  push:
    branches: [stop-backend-on-window-close]

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stop-backend-on-window-close
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update documentation
        run: python tools/apply_window_close_docs.py
      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md "Quick Start Readme.txt" BUILD.md RELEASE_NOTES.md
          if git diff --cached --quiet; then
            echo "Documentation already current."
          else
            git commit -m "Document close-window backend shutdown"
            git push origin HEAD:stop-backend-on-window-close
          fi
