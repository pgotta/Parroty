name: Package Parroty Source

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build clean full-project ZIP
        run: |
          mkdir -p staging/Parroty
          rsync -a --exclude='.git/' --exclude='.github/workflows/package-source.yml' --exclude='staging/' --exclude='.package-trigger' ./ staging/Parroty/
          cd staging
          zip -qr ../Parroty-full-latest.zip Parroty
      - name: Upload source ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Parroty-full-latest
          path: Parroty-full-latest.zip
          if-no-files-found: error
          retention-days: 1
