name: Window close stops backend

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-close-shutdown:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse launcher scripts
        shell: pwsh
        run: |
          python -m py_compile launch_parroty.pyw
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Verify recorded listener is stopped
        shell: pwsh
        run: |
          $listener = Start-Process python -ArgumentList @(
            "-m", "http.server", "5000", "--bind", "127.0.0.1"
          ) -PassThru -WindowStyle Hidden

          try {
            $ready = $false
            for ($i = 0; $i -lt 40; $i++) {
              Start-Sleep -Milliseconds 250
              try {
                $client = [System.Net.Sockets.TcpClient]::new("127.0.0.1", 5000)
                $client.Dispose()
                $ready = $true
                break
              } catch {}
            }
            if (-not $ready) { throw "Dummy backend did not start on port 5000" }

            $tokens = $null
            $errors = $null
            $ast = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path "parroty_window.ps1"),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) { throw "PowerShell parser errors found" }

            $functions = $ast.FindAll({
              param($node)
              $node -is [System.Management.Automation.Language.FunctionDefinitionAst]
            }, $true)
            foreach ($function in $functions) {
              Invoke-Expression $function.Extent.Text
            }

            $captured = @(Get-ParrotyBackendPids -ListenerPort 5000)
            if ($captured -notcontains $listener.Id) {
              throw "Listener PID $($listener.Id) was not captured: $($captured -join ', ')"
            }

            Stop-ParrotyBackend -ProcessIds $captured
            Start-Sleep -Milliseconds 500
            if (Get-Process -Id $listener.Id -ErrorAction SilentlyContinue) {
              throw "Recorded backend PID was still running after shutdown"
            }
          }
          finally {
            Stop-Process -Id $listener.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Enforce BAT exclusion
        shell: pwsh
        run: |
          $trackedBat = @(git ls-files "*.bat")
          if ($trackedBat.Count -gt 0) {
            throw "Tracked BAT files found: $($trackedBat -join ', ')"
          }
          $ignore = Get-Content .gitignore -Raw
          if ($ignore -notmatch '(?m)^\*\.bat\s*$') {
            throw ".gitignore does not block *.bat"
          }
