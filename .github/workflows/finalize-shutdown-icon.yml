name: Finalize shutdown and window icon

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: finalize-shutdown-and-window-icon
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore Parroty icon payload
        run: >-
          python -c "import base64,pathlib;
          data=base64.b64decode(pathlib.Path('tools/parroty_icon.b64').read_text(encoding='utf-8').strip(),validate=True);
          pathlib.Path('parroty.ico').write_bytes(data);
          print('Restored parroty.ico:',len(data),'bytes')"

      - name: Apply confirmed local changes
        id: apply
        continue-on-error: true
        shell: pwsh
        run: python tools/finalize_shutdown_icon_docs.py *> updater.log

      - name: Upload updater diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finalization-updater-diagnostics
          path: updater.log
          if-no-files-found: warn

      - name: Parse PowerShell and Python
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          python -m py_compile launch_parroty.pyw app/server.py app/narrate_worker.py

      - name: Verify full process-tree shutdown
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: |
          @'
          import pathlib
          import subprocess
          import sys
          import time

          child = subprocess.Popen([sys.executable, "-c", "import time; time.sleep(120)"])
          pathlib.Path("child.pid").write_text(str(child.pid), encoding="utf-8")
          time.sleep(120)
          '@ | Set-Content -LiteralPath tree_parent.py -Encoding UTF8

          $parent = Start-Process python -ArgumentList "tree_parent.py" -PassThru -WindowStyle Hidden
          try {
            $childPid = $null
            for ($i = 0; $i -lt 40; $i++) {
              Start-Sleep -Milliseconds 250
              if (Test-Path child.pid) {
                $childPid = [int](Get-Content child.pid -Raw)
                break
              }
            }
            if (-not $childPid) { throw "Child PID was not created" }
            if (-not (Get-Process -Id $parent.Id -ErrorAction SilentlyContinue)) { throw "Parent exited too soon" }
            if (-not (Get-Process -Id $childPid -ErrorAction SilentlyContinue)) { throw "Child exited too soon" }

            $tokens = $null
            $errors = $null
            $ast = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path "parroty_window.ps1"),
              [ref]$tokens,
              [ref]$errors
            )
            $functions = $ast.FindAll({
              param($node)
              $node -is [System.Management.Automation.Language.FunctionDefinitionAst]
            }, $true)
            foreach ($function in $functions) {
              Invoke-Expression $function.Extent.Text
            }

            Stop-ParrotyBackend -ProcessIds @($parent.Id)
            Start-Sleep -Milliseconds 750

            if (Get-Process -Id $parent.Id -ErrorAction SilentlyContinue) {
              throw "Parent process survived full-tree shutdown"
            }
            if (Get-Process -Id $childPid -ErrorAction SilentlyContinue) {
              throw "Child narration-worker stand-in survived full-tree shutdown"
            }
            Write-Host "Verified taskkill /T stops both parent and child."
          }
          finally {
            Stop-Process -Id $parent.Id -Force -ErrorAction SilentlyContinue
            if ($childPid) { Stop-Process -Id $childPid -Force -ErrorAction SilentlyContinue }
            Remove-Item tree_parent.py,child.pid -Force -ErrorAction SilentlyContinue
          }

      - name: Verify icon and documentation assets
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: |
          if (-not (Test-Path app/static/parroty.ico)) { throw "Static Parroty icon missing" }
          $rootHash = (Get-FileHash parroty.ico -Algorithm SHA256).Hash
          $staticHash = (Get-FileHash app/static/parroty.ico -Algorithm SHA256).Hash
          if ($rootHash -ne $staticHash) { throw "Static icon does not match root parroty.ico" }

          $html = Get-Content app/templates/index.html -Raw
          if ($html -notmatch '/static/parroty\.ico') { throw "Favicon link missing" }

          $launcher = Get-Content parroty_window.ps1 -Raw
          foreach ($required in @('taskkill.exe /PID $backendProcessId /T /F','Set-ParrotyWindowIcon','WM_SETICON')) {
            if (-not $launcher.Contains($required)) { throw "Launcher is missing: $required" }
          }

          $quick = Get-Content "Quick Start Readme.txt" -Raw
          if (-not $quick.Contains('app.narrate_worker')) { throw "Quick Start stop.bat does not detect workers" }
          if (-not $quick.Contains('/T /F')) { throw "Quick Start stop.bat does not terminate process trees" }

      - name: Enforce repository policy
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: |
          $trackedBat = @(git ls-files "*.bat")
          if ($trackedBat.Count -gt 0) {
            throw "Tracked BAT files found: $($trackedBat -join ', ')"
          }
          $ignore = Get-Content .gitignore -Raw
          if ($ignore -notmatch '(?m)^\*\.bat\s*$') {
            throw ".gitignore does not block *.bat"
          }

      - name: Commit generated final files
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parroty.ico parroty_window.ps1 app/templates/index.html app/static/parroty.ico README.md "Quick Start Readme.txt" BUILD.md RELEASE_NOTES.md
          if (git diff --cached --quiet) {
            Write-Host "Final files already current."
          } else {
            git commit -m "Finalize process-tree shutdown and window icon"
            git push origin HEAD:finalize-shutdown-and-window-icon
          }

      - name: Enforce updater result
        if: steps.apply.outcome != 'success'
        run: exit 1
