name: Build voice audition pack

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install builder dependency
        run: python -m pip install --quiet "huggingface_hub>=0.34,<2"
      - name: Compile builder
        id: compile
        continue-on-error: true
        run: python -m py_compile tools/build_voice_audition_pack.py > build.log 2>&1
      - name: Build audition pack
        id: build
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        run: python tools/build_voice_audition_pack.py >> build.log 2>&1
      - name: Verify ZIP
        id: verify
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          python - <<'PY' >> build.log 2>&1
          import json, zipfile
          from pathlib import Path
          p = Path('dist/Parroty-Voice-Audition-Pack.zip')
          assert p.exists() and p.stat().st_size > 500_000
          with zipfile.ZipFile(p) as z:
              bad = z.testzip()
              assert bad is None, bad
              names = set(z.namelist())
              assert 'Generate Voice Reviews.bat' in names
              assert 'voice_review/generate_previews.py' in names
              assert 'voice_review/review.html' in names
              refs = sorted(n for n in names if n.startswith('voice_review/references/') and n.endswith('.wav'))
              assert len(refs) == 8, refs
              candidates = json.loads(z.read('voice_review/candidates.json'))
              assert len(candidates) == 8
          print('Verified', p, p.stat().st_size, 'bytes')
          PY
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-pack-build-diagnostics
          path: build.log
          if-no-files-found: warn
      - name: Upload audition pack
        if: steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Parroty-Voice-Audition-Pack
          path: dist/Parroty-Voice-Audition-Pack.zip
          if-no-files-found: error
      - name: Enforce result
        if: steps.compile.outcome != 'success' || steps.build.outcome != 'success' || steps.verify.outcome != 'success'
        run: exit 1
