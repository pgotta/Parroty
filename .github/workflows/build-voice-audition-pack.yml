name: Build voice audition pack

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install builder dependency
        run: python -m pip install --quiet "huggingface_hub>=0.34,<2"
      - name: Build audition pack
        run: python tools/build_voice_audition_pack.py
      - name: Verify ZIP
        run: |
          python - <<'PY'
          import json, zipfile
          from pathlib import Path
          p = Path('dist/Parroty-Voice-Audition-Pack.zip')
          assert p.exists() and p.stat().st_size > 500_000
          with zipfile.ZipFile(p) as z:
              bad = z.testzip()
              assert bad is None, bad
              names = set(z.namelist())
              assert 'Generate Voice Reviews.bat' in names
              assert 'voice_review/generate_previews.py' in names
              assert 'voice_review/review.html' in names
              refs = sorted(n for n in names if n.startswith('voice_review/references/') and n.endswith('.wav'))
              assert len(refs) == 8, refs
              candidates = json.loads(z.read('voice_review/candidates.json'))
              assert len(candidates) == 8
          print('Verified', p, p.stat().st_size, 'bytes')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: Parroty-Voice-Audition-Pack
          path: dist/Parroty-Voice-Audition-Pack.zip
          if-no-files-found: error
