name: Apply Parroty Desktop Upgrade

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-parroty-desktop-upgrade.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply focused launcher and monitor changes
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip
          payload = ""
          data = gzip.decompress(base64.b64decode(payload))
          open('/tmp/apply_parroty_upgrade.py', 'wb').write(data)
          PY
          python /tmp/apply_parroty_upgrade.py

      - name: Validate focused changes
        shell: bash
        run: |
          python -m py_compile app/server.py app/narrate_worker.py launch_parroty.pyw
          node --check app/static/app.js
          python - <<'PY'
          from pathlib import Path
          html = Path('app/templates/index.html').read_text(encoding='utf-8')
          css = Path('app/static/style.css').read_text(encoding='utf-8')
          js = Path('app/static/app.js').read_text(encoding='utf-8')
          server = Path('app/server.py').read_text(encoding='utf-8')
          assert html.count('id="systemMonitor"') == 1
          assert '.system-monitor {' in css
          assert 'fetch("/api/system"' in js
          assert '@app.route("/api/system")' in server
          assert 'f"--app={url}"' in server
          assert Path('run.bat').exists()
          assert Path('launch_parroty.pyw').exists()
          assert Path('create_desktop_shortcut.vbs').exists()
          PY

      - name: Commit final project files and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-parroty-desktop-upgrade.yml
          rm -rf __pycache__ app/__pycache__
          git config user.name "pgotta"
          git config user.email "168211683+pgotta@users.noreply.github.com"
          git add -A
          git commit -m "Match Stemmy desktop launch and system monitor"
          git push origin HEAD:main
