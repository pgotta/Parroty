name: Integrate default voices

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integrate-default-voices
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install integration dependency
        run: python -m pip install --quiet "huggingface_hub>=0.34,<2"
      - name: Download, integrate, and verify voices
        run: python tools/integrate_default_voices.py
      - name: Compile catalog
        run: python -m py_compile app/tts.py
      - name: Commit generated voice assets
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/tts.py app/assets/voices
          if (git diff --cached --quiet) {
            Write-Host "Voice assets already integrated."
          } else {
            git commit -m "Add eight default Chatterbox voices"
            git push origin HEAD:integrate-default-voices
          }
