name: Window launcher regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  window-launcher:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install --quiet "Flask==3.0.3"
      - name: Compile launcher
        run: python -m py_compile launch_parroty.pyw app/server.py
      - name: Parse PowerShell helper
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "parroty_window.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
          Write-Host "PowerShell parser passed"
      - name: Verify dedicated hidden launch path
        run: python .github/test_window_launcher.py
